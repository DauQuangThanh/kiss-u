# Local dev compose starter. Adapt per project.

services:
  app:
    build: .
    ports: ["8080:8080"]
    environment:
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on: [db, cache]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes: ["db:/var/lib/postgresql/data"]

  cache:
    image: redis:7-alpine

volumes:
  db:
