# Git Branching Workflow Extension Configuration
# Copied to .kiss/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[kiss] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: false
  before_clarify-specs:
    enabled: false
    message: "[kiss] Save progress before clarification"
  before_plan:
    enabled: false
    message: "[kiss] Save progress before planning"
  before_taskify:
    enabled: false
    message: "[kiss] Save progress before task generation"
  before_implement:
    enabled: false
    message: "[kiss] Save progress before implementation"
  before_checklist:
    enabled: false
    message: "[kiss] Save progress before checklist"
  before_verify-tasks:
    enabled: false
    message: "[kiss] Save progress before analysis"
  before_tasks-to-issues:
    enabled: false
    message: "[kiss] Save progress before issue sync"
  after_standardize:
    enabled: false
    message: "[kiss] Add project standards"
  after_specify:
    enabled: false
    message: "[kiss] Add specification"
  after_clarify-specs:
    enabled: false
    message: "[kiss] Clarify specification"
  after_plan:
    enabled: false
    message: "[kiss] Add implementation plan"
  after_taskify:
    enabled: false
    message: "[kiss] Add tasks"
  after_implement:
    enabled: false
    message: "[kiss] Implementation progress"
  after_checklist:
    enabled: false
    message: "[kiss] Add checklist"
  after_verify-tasks:
    enabled: false
    message: "[kiss] Add analysis report"
  after_tasks-to-issues:
    enabled: false
    message: "[kiss] Sync tasks to issues"
